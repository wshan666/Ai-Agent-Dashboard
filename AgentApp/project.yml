name: AgentApp
options:
  bundleIdPrefix: com.agent
  deploymentTarget:
    iOS: "16.0"
settings:
  base:
    MARKETING_VERSION: "1.1.0"
    CURRENT_PROJECT_VERSION: "31"
    SWIFT_VERSION: "5.0"
    TARGETED_DEVICE_FAMILY: "1"
    CODE_SIGN_IDENTITY: ""
    CODE_SIGNING_REQUIRED: NO
    CODE_SIGNING_ALLOWED: NO
targets:
  AgentApp:
    type: application
    platform: iOS
    sources:
      - path: Sources
      - path: Resources
        excludes:
          - Info.plist
    settings:
      base:
        INFOPLIST_FILE: Resources/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.agent.dashboard
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
