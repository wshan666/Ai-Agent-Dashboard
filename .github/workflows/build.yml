name: Build IPA

on:
  push:
    branches: [master, main, "codex/**"]
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Verify Native iOS App
        run: |
          if [ -d AgentApp/Sources/www ]; then
            echo "AgentApp must not bundle Sources/www HTML assets."
            exit 1
          fi
          if grep -R -E "WKWebView|WebKit|UIViewRepresentable|AgentWebContainer|WebContainerView" AgentApp/Sources; then
            echo "AgentApp must stay native SwiftUI, not a web shell."
            exit 1
          fi

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode Project
        run: |
          cd AgentApp
          xcodegen generate

      - name: Read Version
        id: version
        run: |
          VER=$(python3 -c "
          import plistlib
          with open('AgentApp/Resources/Info.plist', 'rb') as f:
              pl = plistlib.load(f)
          print(pl['CFBundleShortVersionString'])
          ")
          echo "version=$VER" >> $GITHUB_OUTPUT

      - name: Build App
        run: |
          set -o pipefail
          cd AgentApp
          xcodebuild build \
            -project AgentApp.xcodeproj \
            -scheme AgentApp \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath ../build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            PROVISIONING_PROFILE="" \
            ONLY_ACTIVE_ARCH=NO 2>&1 | tee ../build.log

      - name: Package IPA
        run: |
          APP=$(find build -name "*.app" -type d 2>/dev/null | head -1)
          if [ -n "$APP" ] && [ -d "$APP" ]; then
            plutil -convert xml1 "$APP/Info.plist"
            mkdir -p Payload
            cp -R "$APP" Payload/
            zip -r agent_db.ipa Payload
            rm -rf Payload
            ls -lh agent_db.ipa
          else
            echo "No .app found"
            exit 1
          fi

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: agent_db
          path: agent_db.ipa

      - name: Deploy to OTA Server
        if: vars.OTA_HOST != ''
        run: |
          echo "Deploying v${{ steps.version.outputs.version }} to OTA..."
          pip3 install --break-system-packages paramiko
          python3 << 'PYEOF'
          import paramiko, os, json, plistlib, datetime
          from io import BytesIO

          host = os.environ["OTA_HOST"]
          port = int(os.environ.get("OTA_PORT", "22"))
          user = os.environ.get("OTA_USER", "root")
          password = os.environ["OTA_PASSWORD"]
          version = os.environ["VERSION"]
          ipa_file = "agent_db.ipa"
          remote_dir = "/opt/phonefinder-server/ota"
          http_base = f"http://{host}:{os.environ.get('OTA_HTTP_PORT','8000')}/ota"

          print(f"Connecting to {host}:{port}...")
          ssh = paramiko.SSHClient()
          ssh.set_missing_host_key_policy(paramiko.AutoAddPolicy())
          ssh.connect(host, port=port, username=user, password=password, timeout=30)
          sftp = ssh.open_sftp()

          # Upload IPA
          remote_ipa = f"{remote_dir}/agent_db.ipa"
          sftp.put(ipa_file, remote_ipa)
          print(f"Uploaded {ipa_file} -> {remote_ipa}")

          # Generate agent_install.plist
          install = {
              "items": [{
                  "assets": [
                      {"kind": "software-package", "url": f"{http_base}/agent_db.ipa"},
                      {"kind": "display-image", "url": f"{http_base}/icon-57.png"},
                      {"kind": "full-size-image", "url": f"{http_base}/icon-512.png"}
                  ],
                  "metadata": {
                      "bundle-identifier": "com.agent.dashboard",
                      "bundle-version": version,
                      "kind": "software",
                      "title": f"AI Agent v{version}"
                  }
              }]
          }
          sftp.putfo(BytesIO(plistlib.dumps(install)), f"{remote_dir}/agent_install.plist")
          print("Updated agent_install.plist")

          # Generate agent_sign.json
          sign = {
              "name": f"AI Agent v{version}",
              "version": version,
              "ipa": f"{http_base}/agent_db.ipa",
              "plist": f"{http_base}/agent_install.plist",
              "icon": f"{http_base}/icon-57.png",
              "time": datetime.datetime.now().isoformat()
          }
          sftp.putfo(BytesIO(json.dumps(sign, indent=2, ensure_ascii=False).encode()), f"{remote_dir}/agent_sign.json")
          print("Updated agent_sign.json")

          # Merge repo.json (add/update agent entry, keep others)
          repo = {"name": "AI Tools", "identifier": "com.agent.repo",
                  "sourceURL": f"{http_base}/repo.json", "apps": []}
          try:
              with sftp.file(f"{remote_dir}/repo.json", "r") as f:
                  existing = json.load(f)
                  repo["apps"] = [a for a in existing.get("apps", []) if a.get("bundleIdentifier") != "com.agent.dashboard"]
          except:
              pass
          repo["apps"].append({
              "name": "AI Agent",
              "bundleIdentifier": "com.agent.dashboard",
              "version": version,
              "versionDate": datetime.datetime.now().strftime("%Y-%m-%d"),
              "size": os.path.getsize(ipa_file),
              "downloadURL": f"{http_base}/agent_db.ipa",
              "iconURL": f"{http_base}/icon-57.png",
              "localizedDescription": f"AI Agent Dashboard v{version}",
              "screenshotURLs": []
          })
          sftp.putfo(BytesIO(json.dumps(repo, indent=2, ensure_ascii=False).encode()), f"{remote_dir}/repo.json")
          print(f"repo.json now has {len(repo['apps'])} app(s)")

          # Merge apps.plist
          apps = {"items": []}
          try:
              with sftp.file(f"{remote_dir}/apps.plist", "r") as f:
                  old = plistlib.load(f)
                  apps["items"] = [a for a in old.get("items", []) if a.get("bundleID") != "com.agent.dashboard"]
          except:
              pass
          apps["items"].append({
              "name": "AI Agent",
              "bundleID": "com.agent.dashboard",
              "version": version,
              "url": f"{http_base}/agent_db.ipa"
          })
          sftp.putfo(BytesIO(plistlib.dumps(apps)), f"{remote_dir}/apps.plist")
          print(f"apps.plist now has {len(apps['items'])} app(s)")

          # Copy icons from main ota dir if missing
          for icon in ["icon-57.png", "icon-512.png"]:
              try: sftp.stat(f"{remote_dir}/{icon}")
              except FileNotFoundError:
                  try:
                      with sftp.file(f"{remote_dir}/{icon}", "rb") as src: data = src.read()
                      sftp.putfo(BytesIO(data), f"{remote_dir}/{icon}")
                      print(f"Copied {icon}")
                  except: pass

          sftp.close(); ssh.close()
          print(f"v{version} deployed to OTA")
          PYEOF
        env:
          OTA_HOST: ${{ vars.OTA_HOST }}
          OTA_PORT: ${{ vars.OTA_PORT }}
          OTA_USER: ${{ vars.OTA_USER }}
          OTA_HTTP_PORT: ${{ vars.OTA_HTTP_PORT }}
          OTA_PASSWORD: ${{ secrets.OTA_PASSWORD }}
          VERSION: ${{ steps.version.outputs.version }}
